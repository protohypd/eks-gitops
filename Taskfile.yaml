version: "3"

vars:
  ENVIRONMENT: '{{.ENVIRONMENT | default "dev"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  help:
    desc: Show usage
    cmds:
      - |
        echo ""
        echo "Usage:"
        echo "  task <target> [ENVIRONMENT=dev|staging|production|hub]"
        echo ""
        task --list

  # === Validation ===

  lint:yaml:
    desc: Run yamllint on all YAML files
    cmds:
      - yamllint -c .yamllint.yaml .

  kustomize:build:
    desc: Build all Kustomize overlays (all environments) + env-agnostic roots
    cmds:
      - |
        echo "Building all Kustomize overlays..."
        find . -path '*/overlays/*/kustomization.yaml' -exec dirname {} \; | while read dir; do
          echo "Building $dir ..."
          kustomize build --enable-helm "$dir" > /dev/null || exit 1
        done
        # Env-agnostic kustomize roots — identical on every cluster (their
        # per-environment values resolve through External Secrets and the
        # cluster generator), so they carry no per-env overlays.
        for dir in dashboards/base addons/bootstrap/secret-stores; do
          echo "Building $dir ..."
          kustomize build --enable-helm "$dir" > /dev/null || exit 1
        done
        echo "All manifests built successfully."

  kustomize:build:env:
    desc: "Build overlays for ENVIRONMENT (default: dev)"
    cmds:
      - |
        echo "Building {{.ENVIRONMENT}} overlays..."
        find . -path "*/overlays/{{.ENVIRONMENT}}/kustomization.yaml" -exec dirname {} \; | while read dir; do
          echo "Building $dir ..."
          kustomize build --enable-helm "$dir" > /dev/null || exit 1
        done
        echo "All {{.ENVIRONMENT}} overlays built successfully."

  validate:dashboards:
    desc: "Dashboard gate — grafana.com ids must exist and be AMG-saveable"
    cmds:
      - ./scripts/validate-dashboards.py

  validate:fork-safety:
    desc: "Fork-safety gate — no hardcoded catalog repoURL in applied ApplicationSets (report-only)"
    cmds:
      - ./scripts/check-hardcoded-org.py

  validate:
    desc: Run all validations (lint + build + dashboard/fork-safety gates)
    deps: [lint:yaml, kustomize:build, validate:dashboards, validate:fork-safety]
    cmds:
      - echo "All validations passed."

  scan:
    desc: "Schema + misconfiguration gates on rendered/ (run task render first)"
    cmds:
      - |
        kubeconform -strict -summary \
          -schema-location default \
          -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{"{{"}}.Group{{"}}"}}/{{"{{"}}.ResourceKind{{"}}"}}_{{"{{"}}.ResourceAPIVersion{{"}}"}}.json' \
          -skip Grafana \
          rendered
      - |
        trivy config --exit-code 1 \
          --severity MEDIUM,HIGH,CRITICAL \
          --ignorefile .trivyignore.yaml \
          rendered

  # === Rendering ===

  render:
    desc: "Render overlays to rendered/ directory for ENVIRONMENT (default: dev)"
    cmds:
      - |
        mkdir -p rendered
        echo "Rendering {{.ENVIRONMENT}} overlays..."
        find . -path "*/overlays/{{.ENVIRONMENT}}/kustomization.yaml" -exec dirname {} \; | while read dir; do
          name=$(echo "$dir" | sed 's|^\./||' | tr '/' '-')
          echo "Rendering $dir ..."
          kustomize build --enable-helm "$dir" > "rendered/${name}.yaml" || exit 1
        done
        # Druid catalog chart with synthetic tenant values — same render CI
        # gates (see .github/workflows/ci.yml).
        echo "Rendering catalog/druid/chart ..."
        helm template ci catalog/druid/chart -n druid-ci \
          -f catalog/druid/values.yaml \
          --set hostedId=ci \
          --set environment={{.ENVIRONMENT}} \
          --set secrets.metadata=ci/druid/metadata \
          --set secrets.admin=ci/druid/admin \
          --set secrets.system=ci/druid/system \
          --set secrets.keystore=ci/druid/keystore \
          --set s3.indexLogsBucket=ci-druid-indexlogs \
          --set s3.deepStorageBucket=ci-druid-deepstorage \
          --set s3.msqBucket=ci-druid-msq \
          > rendered/catalog-druid-chart.yaml
        echo "All {{.ENVIRONMENT}} overlays rendered to rendered/"

  clean:
    desc: Remove rendered output
    cmds:
      - rm -rf rendered/
