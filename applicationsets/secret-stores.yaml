# Cluster-scoped External Secrets wiring, installed on every cluster once the
# External Secrets Operator CRDs exist (the operator itself installs at wave 0 in
# addons-bootstrap). Provides the aws-secrets-manager ClusterSecretStore that the
# Grafana token and monitoring-endpoint ExternalSecrets pull through, plus the
# ClusterExternalSecret that syncs the AMP endpoints. Sync-wave 1 so the store is
# ready before any namespace's ExternalSecret reconciles.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: secret-stores
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - appName: secret-stores
                  namespace: external-secrets
                  path: addons/bootstrap/secret-stores
                  syncWave: "1"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      source:
        repoURL: '{{ index .metadata.annotations "gitops/repo-url" }}'
        targetRevision: main
        path: '{{ .path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      # The external-secrets mutating webhook defaults remoteRef.{conversionStrategy,
      # decodingStrategy,metadataPolicy} and target.deletionPolicy onto every
      # ExternalSecret; git omits them, so the app sat permanently OutOfSync while
      # Healthy. Same class of drift handled in the dashboards ApplicationSet.
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
            - .spec.target.deletionPolicy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
