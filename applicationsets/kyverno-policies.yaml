apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                matchExpressions:
                  # Exclude the hub - it runs only observability + dashboards + bootstrap deps.
                  - key: environment
                    operator: NotIn
                    values:
                      - hub
          - list:
              elements:
                - appName: kyverno-pss
                  path: policies/kyverno/pod-security-standards
                  syncWave: "20"
                - appName: kyverno-best-practices
                  path: policies/kyverno/best-practices
                  syncWave: "21"
                - appName: kyverno-supply-chain
                  path: policies/kyverno/supply-chain
                  syncWave: "22"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/nanohype/eks-gitops.git
        targetRevision: main
        path: '{{ .path }}/overlays/{{ index .metadata.labels "environment" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: kyverno
      # Kyverno rewrites its own ClusterPolicies after admission: it defaults
      # .spec.emitWarning / .spec.admission, and its autogen feature injects a
      # generated `autogen-<name>` rule per pod controller (Deployment, DaemonSet,
      # CronJob, ...) into .spec.rules. None of that is in git, so the policy was
      # permanently OutOfSync. Ignore only the fields Kyverno owns — the autogen
      # rules are selected by name, so a genuine change to a real rule in git is
      # still detected as drift.
      ignoreDifferences:
        - group: kyverno.io
          kind: ClusterPolicy
          jqPathExpressions:
            - .spec.rules[]? | select(.name | startswith("autogen-"))
            - .spec.emitWarning
            - .spec.admission
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
