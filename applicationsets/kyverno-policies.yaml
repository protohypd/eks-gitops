apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                matchExpressions:
                  # Exclude the hub - it runs only observability + dashboards + bootstrap deps.
                  - key: environment
                    operator: NotIn
                    values:
                      - hub
          - list:
              elements:
                - appName: kyverno-pss
                  path: policies/kyverno/pod-security-standards
                  syncWave: "20"
                - appName: kyverno-best-practices
                  path: policies/kyverno/best-practices
                  syncWave: "21"
                - appName: kyverno-supply-chain
                  path: policies/kyverno/supply-chain
                  syncWave: "22"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/nanohype/eks-gitops.git
        targetRevision: main
        path: '{{ .path }}/overlays/{{ index .metadata.labels "environment" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: kyverno
      # Kyverno defaults five fields onto its own ClusterPolicies at admission. None
      # are in git, so the policy sat permanently OutOfSync while Healthy. The exact
      # set was enumerated by diffing `kustomize build overlays/dev` against the live
      # object — not guessed:
      #
      #   .spec.admission                                                = true
      #   .spec.emitWarning                                              = false
      #   .spec.rules[].skipBackgroundRequests                           = true
      #   .spec.rules[].verifyImages[].useCache                          = true
      #   .spec.rules[].verifyImages[].attestors[].entries[]
      #     .signatureAlgorithm                                          = "sha256"
      #
      # Each path is a Kyverno-owned default, so the ignores stay narrow: a genuine
      # change to a rule's match/exclude/attestor identity in git is still drift.
      ignoreDifferences:
        - group: kyverno.io
          kind: ClusterPolicy
          jqPathExpressions:
            - .spec.admission
            - .spec.emitWarning
            - .spec.rules[].skipBackgroundRequests
            - .spec.rules[].verifyImages[].useCache
            - .spec.rules[].verifyImages[].attestors[].entries[].signatureAlgorithm
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
