apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                matchExpressions:
                  # Exclude the hub - it runs only observability + dashboards + bootstrap deps.
                  - key: environment
                    operator: NotIn
                    values:
                      - hub
          - list:
              elements:
                # protohype-team apps promoted to their own repos.
                # Add one element per app; each carries its own source repo.
                - app: slack-knowledge-bot
                  repoURL: https://github.com/nanohype/slack-knowledge-bot.git
                  path: chart
                - app: digest-pipeline
                  repoURL: https://github.com/nanohype/digest-pipeline.git
                  path: chart
                - app: incident-response
                  repoURL: https://github.com/nanohype/incident-response.git
                  path: chart
                - app: competitive-intelligence
                  repoURL: https://github.com/nanohype/competitive-intelligence.git
                  path: chart
  template:
    metadata:
      name: '{{ .app }}-{{ index .metadata.labels "environment" }}'
      annotations:
        argocd.argoproj.io/sync-wave: "100"
    spec:
      project: '{{ .app }}'
      sources:
        - repoURL: '{{ .repoURL }}'
          targetRevision: main
          path: '{{ .path }}'
          helm:
            valueFiles:
              - $values/{{ .path }}/values.yaml
              - $values/{{ .path }}/values-{{ index .metadata.labels "environment" }}.yaml
        - repoURL: '{{ .repoURL }}'
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        # Per-app tenant namespace the operator creates from the Platform name
        # (PlatformNamespace = tenants-<platform>); CreateNamespace=false below.
        namespace: 'tenants-{{ .app }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false # Platform reconciler owns the Namespace
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
