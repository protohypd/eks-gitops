apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dashboards
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "60"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - appName: dashboards
                  namespace: grafana-operator
                  path: dashboards
                  syncWave: "60"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/nanohype/eks-gitops.git
        targetRevision: main
        path: '{{ .path }}/base'
        # The Grafana CR's workspace URL is per-cluster and can't be templated
        # from a Secret, so inject it here from the monitoring/grafana-url
        # annotation cluster-bootstrap publishes on the cluster Secret. Every
        # other per-environment endpoint resolves through External Secrets.
        kustomize:
          patches:
            - target:
                kind: Grafana
                name: external
              patch: |-
                - op: replace
                  path: /spec/external/url
                  value: '{{ index .metadata.annotations "monitoring/grafana-url" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      # The external-secrets mutating webhook defaults remoteRef.{conversionStrategy,
      # decodingStrategy,metadataPolicy} and target.deletionPolicy onto every
      # ExternalSecret. Git omits them, so ArgoCD saw perpetual drift on the two
      # dashboards ExternalSecrets (grafana-external-credentials, managed-monitoring-
      # endpoints) and selfHeal churned forever — the app never reached a clean
      # Synced/Healthy state. Ignore those server-defaulted paths; the
      # RespectIgnoreDifferences syncOption makes selfHeal honor the ignores too,
      # not just the diff view.
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
            - .spec.target.deletionPolicy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
