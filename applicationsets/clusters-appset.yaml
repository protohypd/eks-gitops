# Applies the namespaced eks-fleet Cluster CRs the portal commits to the clusters
# GitOps repo. Runs on the eks-fleet MANAGEMENT (hub) cluster's ArgoCD — the hub
# holds the Cluster API + composition + Crossplane, so reconciling a Cluster here
# vends a workload cluster. The portal's order desk templates a Cluster CR from the
# provision form and commits one manifest per cluster to
# clusters/<environment>/<name>.yaml; without this ApplicationSet nothing applies
# those commits, so portal-provisioned clusters never reach the hub's Crossplane.
#
# A git directory generator discovers each per-environment directory and recurses
# its manifests (robust — no per-file content parsing), mirroring portal-tenants.
# repoURL MUST equal the portal worker's GITOPS_CLUSTERS_REPO_URL — both the SSH
# form, since the portal pushes over SSH. ArgoCD needs a matching SSH repo
# credential (a read-only deploy key on the private clusters repo) registered for
# this URL so it can pull what the portal pushes.
#
# prune+selfHeal means removing a cluster file tears the cluster down (Cluster
# delete -> Crossplane tofu destroy); after a teardown, run cloudgov / reap-orphans
# to sweep the EKS log group + Karpenter residue that tofu destroy can't reach.
#
# SCOPING: this must reconcile ONLY on the management (hub) cluster — spokes have
# no Cluster CRD/Crossplane. The destination below is in-cluster, so it's correct
# wherever this ApplicationSet's ArgoCD runs; ensuring it's instantiated only on the
# hub (a cluster-label selector / hub-only App-of-Apps path) is the same open
# multi-cluster-routing question portal-tenants carries — verify on first use.
#
# NOTE: static-validated only (no live hub run yet). Consider per-cluster
# granularity (a git files generator over clusters/*/*.yaml for one Application per
# cluster) once the hub is standing.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clusters
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: git@github.com:nanohype/clusters.git # == portal GITOPS_CLUSTERS_REPO_URL (SSH)
        revision: main
        directories:
          - path: clusters/*
  template:
    metadata:
      name: 'clusters-{{ .path.basename }}'
      annotations:
        argocd.argoproj.io/sync-wave: "100"
    spec:
      project: platform
      source:
        repoURL: git@github.com:nanohype/clusters.git
        targetRevision: main
        path: '{{ .path.path }}'
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
