apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-ai-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                matchExpressions:
                  # Exclude the hub - it runs only observability + dashboards + bootstrap deps.
                  - key: environment
                    operator: NotIn
                    values:
                      - hub
          - list:
              elements:
                # CRDs first (wave 40), then the controllers (wave 42).
                - appName: kagent-crds
                  namespace: kagent
                  chartRepo: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
                  chart: kagent-crds
                  chartVersion: "0.9.11"
                  path: addons/ai-platform/kagent-crds
                  syncWave: "40"
                - appName: agentgateway-crds
                  namespace: agentgateway
                  chartRepo: oci://ghcr.io/agentgateway/agentgateway/charts/agentgateway-crds
                  chart: agentgateway-crds
                  chartVersion: "1.0.1"
                  path: addons/ai-platform/agentgateway-crds
                  syncWave: "40"
                - appName: kagent
                  namespace: kagent
                  chartRepo: oci://ghcr.io/kagent-dev/kagent/helm/kagent
                  chart: kagent
                  chartVersion: "0.9.11"
                  path: addons/ai-platform/kagent
                  syncWave: "42"
                - appName: agentgateway
                  namespace: agentgateway
                  chartRepo: oci://ghcr.io/agentgateway/agentgateway/charts/agentgateway
                  chart: agentgateway
                  chartVersion: "1.0.1"
                  path: addons/ai-platform/agentgateway
                  syncWave: "42"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      sources:
        - repoURL: '{{ .chartRepo }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .chartVersion }}'
          helm:
            releaseName: '{{ .appName }}'
            # No clusterName/vpcId parameters: these are upstream charts with
            # their own value schemas (passing unknown --set values fails their
            # render, as it did for cert-manager).
            valueFiles:
              - $values/{{ .path }}/values.yaml
              - $values/{{ .path }}/values-{{ index .metadata.labels "environment" }}.yaml
        - repoURL: https://github.com/nanohype/eks-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
