apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - appName: kube-state-metrics
                  namespace: kube-system
                  chartRepo: https://prometheus-community.github.io/helm-charts
                  chart: kube-state-metrics
                  chartVersion: 7.5.2
                  path: addons/observability/kube-state-metrics
                  syncWave: "29"
                - appName: loki
                  namespace: monitoring
                  chartRepo: https://grafana.github.io/helm-charts
                  chart: loki
                  chartVersion: 7.0.0
                  path: addons/observability/loki
                  syncWave: "30"
                - appName: tempo
                  namespace: monitoring
                  chartRepo: https://grafana.github.io/helm-charts
                  chart: tempo
                  chartVersion: 1.24.4
                  path: addons/observability/tempo
                  syncWave: "31"
                - appName: alloy
                  namespace: monitoring
                  chartRepo: https://grafana.github.io/helm-charts
                  chart: alloy
                  chartVersion: 1.10.0
                  path: addons/observability/alloy
                  syncWave: "32"
                - appName: opencost
                  namespace: opencost
                  chartRepo: https://opencost.github.io/opencost-helm-chart
                  chart: opencost
                  chartVersion: "2.5.22"
                  path: addons/observability/opencost
                  syncWave: "33"
                - appName: grafana-operator
                  namespace: grafana-operator
                  chartRepo: https://grafana.github.io/helm-charts
                  chart: grafana-operator
                  chartVersion: "5.23.0"
                  path: addons/observability/grafana-operator
                  syncWave: "34"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      sources:
        - repoURL: '{{ .chartRepo }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .chartVersion }}'
          helm:
            releaseName: '{{ .appName }}'
            parameters:
              - name: clusterName
                value: '{{ index .metadata.labels "cluster_name" }}'
              - name: vpcId
                value: '{{ index .metadata.labels "vpc_id" }}'
            valueFiles:
              - $values/{{ .path }}/values.yaml
              - $values/{{ .path }}/values-{{ index .metadata.labels "environment" }}.yaml
{{- if and (eq .appName "opencost") (hasKey .metadata.annotations "monitoring/amp-workspace-id") }}
            # opencost queries Amazon Managed Prometheus through a sigv4-proxy
            # sidecar; the workspace id + region flow from the cluster Secret
            # (cluster-bootstrap stamps them from managed-monitoring). The
            # platform has no in-cluster Prometheus, so the chart default
            # (prometheus-server.prometheus-system) is disabled here.
            valuesObject:
              opencost:
                prometheus:
                  internal:
                    enabled: false
                  amp:
                    enabled: true
                    workspaceId: '{{ index .metadata.annotations "monitoring/amp-workspace-id" }}'
              sigV4Proxy:
                region: '{{ index .metadata.labels "region" }}'
                host: 'aps-workspaces.{{ index .metadata.labels "region" }}.amazonaws.com'
{{- end }}
        - repoURL: https://github.com/nanohype/eks-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates
            - .spec.persistentVolumeClaimRetentionPolicy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
