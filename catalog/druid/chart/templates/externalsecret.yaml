apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "druid.name" . }}-druid-metadata
  labels:
    {{- include "common.labels" . | indent 4 }}
  annotations:
    {{- include "common.annotations" . | indent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "druid.name" . }}-druid-metadata
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.secrets.metadata }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.metadata }}
        property: password
    - secretKey: host
      remoteRef:
        key: {{ .Values.secrets.metadata }}
        property: host
    - secretKey: dbname
      remoteRef:
        key: {{ .Values.secrets.metadata }}
        property: dbname
---
