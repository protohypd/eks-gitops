---
# PKCS#12 keystore/truststore password. cert-manager encrypts the keystores it
# writes into the TLS secret with this password (certificate.yaml
# passwordSecretRef), and the pods read the same value back through the
# DRUID_TLS_KEYSTORE_PASSWORD env var — never a literal in the chart.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "druid.name" . }}-keystore-password
  labels:
    {{- include "common.labels" . | indent 4 }}
  annotations:
    {{- include "common.annotations" . | indent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "druid.name" . }}-keystore-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.keystore }}
        property: password
