apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ include "druid.name" . }}-druid-nodeclass
  labels:
    {{- include "common.labels" . | indent 4 }}
  annotations:
    {{- include "common.annotations" . | indent 4 }}
spec:
  role: "{{ .Values.hostedId }}-eks-karpenter-node"
  amiFamily: "Bottlerocket"
  amiSelectorTerms:
    - alias: bottlerocket@latest
  subnetSelectorTerms:
    - tags:
        kubernetes.io/role/internal-elb: "1"
        karpenter.sh/discovery: "{{ .Values.hostedId }}-eks"
  # The NODE security group, not the EKS cluster SG — see
  # addons/operations/karpenter-resources/base/ec2nodeclass.yaml. Selecting the cluster
  # SG puts these nodes in a group with no path to the managed node group, and Cilium's
  # self-referencing rules (WireGuard/health) do not cover them: the nodes come up, and
  # every pod on them silently loses DNS.
  securityGroupSelectorTerms:
    - tags:
        "karpenter.sh/discovery": "{{ .Values.hostedId }}-eks"
  tags:
    "{{ .Values.domain }}:resource-type": dynamic-instance
    "{{ .Values.domain }}:category": analytics
    "{{ .Values.domain }}:type": druid
    "{{ .Values.domain }}:part-of": "{{ .Values.organization }}.{{ .Values.name }}.{{ .Values.alias }}"
