apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "druid.name" . }}-druid-role
  labels:
    {{- include "common.labels" . | indent 4 }}
  annotations:
    {{- include "common.annotations" . | indent 4 }}
# Namespace-scoped permissions for druid-kubernetes-extensions (pod discovery,
# ConfigMap-based announcements/leader election) and
# druid-kubernetes-overlord-extensions (the overlord launches ingestion tasks
# as Jobs and manages their pods/logs). Verbs are enumerated — never "*" — so
# the grant does not silently widen with new API verbs.
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
