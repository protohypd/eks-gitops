apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/external/url
        value: https://g-PLACEHOLDER-production.grafana-workspace.us-west-2.amazonaws.com
    target:
      kind: Grafana
      name: external
  - patch: |-
      - op: replace
        path: /spec/datasource/url
        value: https://aps-workspaces.us-west-2.amazonaws.com/workspaces/ws-PLACEHOLDER-production
    target:
      kind: GrafanaDatasource
      name: managed-prometheus
