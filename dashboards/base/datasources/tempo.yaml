apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: tempo
spec:
  instanceSelector:
    matchLabels:
      dashboards: external
  datasource:
    name: Tempo
    # Pinned UID so dashboards (tenant logs rows) and the Tempo→Loki
    # tracesToLogsV2 bridge can reference this datasource deterministically.
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo.monitoring.svc.cluster.local:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
