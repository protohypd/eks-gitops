apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
spec:
  instanceSelector:
    matchLabels:
      dashboards: external
  datasource:
    name: Loki
    # Pinned UID so dashboards (tenant logs rows) and the Tempo→Loki
    # tracesToLogsV2 bridge can reference this datasource deterministically.
    uid: loki
    type: loki
    access: proxy
    url: http://loki-gateway.monitoring.svc.cluster.local
    jsonData:
      maxLines: 1000
