# Pulls the Amazon Managed Grafana service-account token from AWS Secrets
# Manager and materializes it as a Secret named grafana-external-credentials.
# The Grafana CR below references it as the apiKey.
#
# The Secrets Manager secret `eks-grafana-token` is created and seeded by the
# landing-zone managed-monitoring component — it is not hand-made. Alongside the
# token it carries the workspace id, service-account id and region. That is what
# lets grafana-token-rotator refresh the token with no ApplicationSet templating
# and no extra cluster-Secret annotations: everything it needs is already in the
# one secret it has to read.
#
# refreshInterval bounds the rotation handover — consumers pick up a newly minted
# token within the hour, which is why the rotator keeps the previous token valid
# instead of pruning it immediately.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-external-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-external-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: eks-grafana-token
        property: token
    - secretKey: workspaceId
      remoteRef:
        key: eks-grafana-token
        property: workspaceId
    - secretKey: serviceAccountId
      remoteRef:
        key: eks-grafana-token
        property: serviceAccountId
    - secretKey: region
      remoteRef:
        key: eks-grafana-token
        property: region
