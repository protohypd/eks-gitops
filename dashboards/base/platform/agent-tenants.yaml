# eks-agent-platform — Tenants
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: agent-tenants
spec:
  instanceSelector:
    matchLabels:
      dashboards: external
  resyncPeriod: 24h
  json: |
    {
      "title": "eks-agent-platform \u2014 Tenants",
      "uid": "agents-tenants",
      "tags": [
        "eks-agent-platform",
        "tenant",
        "rollup"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1m",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "tenant",
            "type": "query",
            "datasource": "prometheus",
            "query": "label_values(kube_customresource_status_phase{customresource_kind=\"Tenant\"}, name)",
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Tenants",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Tenant\"})",
              "legendFormat": "total"
            },
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Tenant\",customresource_phase=\"Active\"})",
              "legendFormat": "active"
            },
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Tenant\",customresource_phase=\"Suspended\"})",
              "legendFormat": "suspended"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Platforms (cluster-wide)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Platform\"})",
              "legendFormat": "total"
            },
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Platform\",customresource_phase=\"Ready\"})",
              "legendFormat": "ready"
            },
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Platform\",customresource_phase=\"Suspended\"})",
              "legendFormat": "suspended"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          }
        },
        {
          "type": "gauge",
          "title": "Platform ready ratio",
          "datasource": "prometheus",
          "description": "Fraction of Platform CRs in the Ready phase — inline over the kube-state-metrics customResourceState series (no recording-rule dependency; prod has no ruler).",
          "targets": [
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Platform\",customresource_phase=\"Ready\"} == 1) / clamp_min(count(kube_customresource_status_phase{customresource_kind=\"Platform\"}), 1)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 0.8
                  },
                  {
                    "color": "green",
                    "value": 0.95
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Tenants over aggregate cap",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "count(kube_customresource_condition{customresource_kind=\"Tenant\",condition_type=\"TenantBudgetExceeded\",condition_status=\"True\"})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          }
        },
        {
          "type": "timeseries",
          "title": "Aggregate spend by tenant (last 7d)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "kube_customresource_status_field{customresource_kind=\"Tenant\",field=\"aggregateSpendUsd\",name=~\"$tenant\"}",
              "legendFormat": "{{name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD"
            }
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 4
          }
        },
        {
          "type": "timeseries",
          "title": "Percent-of-budget by tenant",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "kube_customresource_status_field{customresource_kind=\"Tenant\",field=\"percentOfBudget\",name=~\"$tenant\"}",
              "legendFormat": "{{name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 100
                  },
                  {
                    "color": "dark-red",
                    "value": 120
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 14
          }
        }
      ]
    }
