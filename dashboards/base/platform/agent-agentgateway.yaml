# eks-agent-platform — agentgateway
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: agent-agentgateway
spec:
  instanceSelector:
    matchLabels:
      dashboards: external
  resyncPeriod: 24h
  json: |
    {
      "title": "eks-agent-platform \u2014 agentgateway",
      "uid": "agents-agentgateway",
      "tags": [
        "eks-agent-platform",
        "agentgateway",
        "bedrock"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "platform",
            "type": "query",
            "datasource": "prometheus",
            "query": "label_values(agentgateway_invocation_duration_seconds_count, platform)",
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Bedrock InvokeModel latency p50 / p95 / p99",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, model_id) (rate(agentgateway_invocation_duration_seconds_bucket{platform=~\"$platform\"}[5m])))",
              "legendFormat": "p50 {{model_id}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, model_id) (rate(agentgateway_invocation_duration_seconds_bucket{platform=~\"$platform\"}[5m])))",
              "legendFormat": "p95 {{model_id}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, model_id) (rate(agentgateway_invocation_duration_seconds_bucket{platform=~\"$platform\"}[5m])))",
              "legendFormat": "p99 {{model_id}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "timeseries",
          "title": "Error rate by model + status",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "sum by (model_id, status) (rate(agentgateway_invocation_total{platform=~\"$platform\",status!=\"200\"}[5m]))",
              "legendFormat": "{{model_id}} {{status}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 10
          }
        },
        {
          "type": "timeseries",
          "title": "Throughput by route (req/s)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "sum by (route) (rate(agentgateway_invocation_total{platform=~\"$platform\"}[1m]))",
              "legendFormat": "{{route}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 10
          }
        },
        {
          "type": "timeseries",
          "title": "Bedrock throttling (CloudWatch)",
          "datasource": "cloudwatch",
          "targets": [
            {
              "namespace": "AWS/Bedrock",
              "metricName": "InvocationThrottles",
              "statistic": "Sum",
              "dimensions": {
                "ModelId": "*"
              },
              "period": "60"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 18
          }
        },
        {
          "type": "timeseries",
          "title": "Estimated in-flight cost (agents/Bedrock metric)",
          "datasource": "cloudwatch",
          "targets": [
            {
              "namespace": "agents/Bedrock",
              "metricName": "EstimatedInvocationCostUsd",
              "statistic": "Sum",
              "dimensions": {
                "PlatformId": "*"
              },
              "period": "60"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 18
          }
        }
      ]
    }
