# eks-agent-platform — Eval Quality
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: agent-eval-quality
spec:
  instanceSelector:
    matchLabels:
      dashboards: external
  resyncPeriod: 24h
  json: |
    {
      "title": "eks-agent-platform \u2014 Eval Quality",
      "uid": "agents-eval-quality",
      "tags": [
        "eks-agent-platform",
        "eval",
        "quality"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "5m",
      "time": {
        "from": "now-30d",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "fleet",
            "type": "query",
            "datasource": "prometheus",
            "query": "label_values(kube_customresource_status_phase{customresource_kind=\"AgentFleet\"}, name)",
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "EvalSuites by status (last run)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"EvalSuite\",customresource_phase=\"Passed\"})",
              "legendFormat": "passed"
            },
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"EvalSuite\",customresource_phase=\"Failed\"})",
              "legendFormat": "failed"
            },
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"EvalSuite\",customresource_phase=\"Provisioning\"})",
              "legendFormat": "no-run-yet"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Suites currently failing",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"EvalSuite\",customresource_phase=\"Failed\"})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 3
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 12,
            "y": 0
          }
        },
        {
          "type": "timeseries",
          "title": "Last-run score per suite (decimal-string \u2192 number; click into a suite to see history)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "kube_customresource_status_field{customresource_kind=\"EvalSuite\",field=\"lastScore\"} ",
              "legendFormat": "{{name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 0.7
                  },
                  {
                    "color": "green",
                    "value": 0.85
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 4
          }
        },
        {
          "type": "table",
          "title": "Eval suites \u2014 current state",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "kube_customresource_status_phase{customresource_kind=\"EvalSuite\"}",
              "format": "table",
              "instant": true
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 14
          }
        }
      ]
    }
