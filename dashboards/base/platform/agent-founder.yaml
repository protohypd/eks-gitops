# eks-agent-platform — Founder / Exec
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: agent-founder
spec:
  instanceSelector:
    matchLabels:
      dashboards: external
  resyncPeriod: 24h
  json: |
    {
      "title": "eks-agent-platform \u2014 Founder / Exec",
      "uid": "agents-founder",
      "tags": [
        "eks-agent-platform",
        "founder",
        "persona"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1h",
      "time": {
        "from": "now-90d",
        "to": "now"
      },
      "panels": [
        {
          "type": "stat",
          "title": "Platforms live",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "count(agents_platform_status_phase{phase=\"Ready\"})"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Spend this week (USD)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "sum(increase(agents_spend_report_current_usd[7d]))"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          }
        },
        {
          "type": "timeseries",
          "title": "Weekly spend trend",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "sum(agents_spend_report_current_usd)"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 4
          }
        },
        {
          "type": "bargauge",
          "title": "Top initiatives by agent activity (last 7d)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "topk(10, sum by (platform_id) (increase(agents_agent_invocations_total[7d])))"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 14
          }
        }
      ]
    }
