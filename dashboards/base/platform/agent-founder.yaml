# eks-agent-platform — Founder / Exec
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: agent-founder
spec:
  instanceSelector:
    matchLabels:
      dashboards: external
  resyncPeriod: 24h
  json: |
    {
      "title": "eks-agent-platform \u2014 Founder / Exec",
      "uid": "agents-founder",
      "tags": [
        "eks-agent-platform",
        "founder",
        "persona"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1h",
      "time": {
        "from": "now-90d",
        "to": "now"
      },
      "panels": [
        {
          "type": "stat",
          "title": "Platforms live",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "count(kube_customresource_status_phase{customresource_kind=\"Platform\",customresource_phase=\"Ready\"} == 1)"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Spend month-to-date (USD)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "sum(kube_customresource_status_field{customresource_kind=\"BudgetPolicy\",field=\"currentSpendUsd\"})"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          }
        },
        {
          "type": "timeseries",
          "title": "Spend trend (USD, month-to-date)",
          "datasource": "prometheus",
          "targets": [
            {
              "expr": "sum(kube_customresource_status_field{customresource_kind=\"BudgetPolicy\",field=\"currentSpendUsd\"})"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 4
          }
        },
        {
          "type": "bargauge",
          "title": "Top initiatives by spend (USD, aggregate)",
          "datasource": "prometheus",
          "description": "Per-Tenant aggregate spend, top 10 — from the kube-state-metrics customResourceState projection of Tenant.status.aggregateSpendUsd.",
          "targets": [
            {
              "expr": "topk(10, sum by (name) (kube_customresource_status_field{customresource_kind=\"Tenant\",field=\"aggregateSpendUsd\"}))"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 14
          }
        }
      ]
    }
