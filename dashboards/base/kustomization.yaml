apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All Grafana CRs target the external (managed) Grafana via the
# instanceSelector label `dashboards: external`.

namespace: grafana-operator

resources:
  - namespace.yaml
  - grafana-token.yaml
  - monitoring-endpoints.yaml
  - grafana.yaml
  - datasources/prometheus.yaml
  - datasources/loki.yaml
  - datasources/tempo.yaml
  - datasources/cloudwatch.yaml
  # Grafana-managed SLO / burn-rate alert rules (folder + per-system rule groups),
  # reconciled onto the external Amazon Managed Grafana.
  - alerting/folder.yaml
  - alerting/portal.yaml
  - alerting/agent-operator.yaml
  - alerting/fleet-vend.yaml
  - alerting/ksm-health.yaml
  - platform/kubernetes-cluster.yaml
  - platform/kubernetes-views-pods.yaml
  - platform/kubernetes-views-namespaces.yaml
  - platform/node-exporter-full.yaml
  - platform/cilium-overview.yaml
  - platform/hubble-overview.yaml
  - platform/aws-load-balancer-controller.yaml
  - platform/cert-manager.yaml
  - platform/external-dns.yaml
  - platform/eso.yaml
  # Agent-platform persona dashboards (operator CR-state + agentgateway + spend).
  # Their kube_customresource_* panels are fed by the kube-state-metrics addon's
  # customResourceState config (addons/observability/kube-state-metrics).
  - platform/agent-tenants.yaml
  - platform/agent-eval-quality.yaml
  - platform/agent-kill-switch.yaml
  - platform/agent-agentgateway.yaml
  - platform/agent-finance.yaml
  - platform/agent-ops.yaml
  - platform/agent-founder.yaml
  # Operator reconcile RED + latency SLO/error-budget (controller-runtime metrics
  # reach AMP via the operator pod's prometheus.io/scrape annotation).
  - platform/agent-operator.yaml
  # Ops control-plane app (portal): API SLO/RED + tofu-run, River-job, watcher,
  # and pgxpool surfaces — self-contained PromQL over the portal_* metrics in AMP.
  - platform/portal.yaml
  # eks-fleet vend pipeline: provider-opentofu reconcile RED + work-queue +
  # reconcile-success SLO (controller-runtime metrics scraped on the hub).
  - platform/fleet-vend.yaml
  - addons/kyverno.yaml
  - addons/trivy-operator.yaml
  - addons/falco.yaml
  - addons/loki.yaml
  - addons/tempo.yaml
  - addons/opencost.yaml
  - addons/velero.yaml
  - addons/goldilocks.yaml
  - addons/descheduler.yaml
  - addons/karpenter.yaml
  - addons/keda.yaml
  - addons/argo-rollouts.yaml
  - addons/argo-events.yaml
  - addons/argo-workflows.yaml
