# External Grafana CR — does NOT deploy a Grafana pod. The grafana-operator
# pushes Dashboards/DataSources to the managed Grafana instance using the
# API token in the referenced Secret.
#
# spec.external.url is the per-cluster Amazon Managed Grafana workspace endpoint.
# grafana-operator can't template this field from a Secret (unlike the data
# source), so the dashboards ApplicationSet patches it via the cluster generator
# from the monitoring/grafana-url annotation cluster-bootstrap stamps on the
# ArgoCD cluster Secret. The empty default below is always overridden by that
# patch on clusters running managed-monitoring.
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: external
  labels:
    dashboards: external
spec:
  external:
    url: ""
    apiKey:
      name: grafana-external-credentials
      key: token
  config: {}
