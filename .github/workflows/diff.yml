name: Diff

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to render'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  contents: read

jobs:
  diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Render manifests
        run: |
          mkdir -p rendered
          find . -path "*/overlays/${{ inputs.environment }}/kustomization.yaml" -exec dirname {} \; | while read dir; do
            name=$(echo "$dir" | sed 's|^\./||' | tr '/' '-')
            echo "Rendering $dir ..."
            kustomize build --enable-helm "$dir" > "rendered/${name}.yaml" || exit 1
          done
          # Env-agnostic kustomize roots (no per-env overlays — same on every cluster).
          for dir in dashboards/base addons/bootstrap/secret-stores; do
            name=$(echo "$dir" | sed 's|^\./||' | tr '/' '-')
            echo "Rendering $dir ..."
            kustomize build --enable-helm "$dir" > "rendered/${name}.yaml" || exit 1
          done
          echo "All manifests rendered."

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v7
        with:
          name: rendered-${{ inputs.environment }}
          path: rendered/
          retention-days: 14
