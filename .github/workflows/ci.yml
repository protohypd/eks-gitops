name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  placeholders:
    name: Zero-placeholder gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: No unfilled placeholders in deploy config
        run: ./scripts/no-placeholders.sh

  lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, production, hub]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Build manifests
        run: |
          echo "Building ${{ matrix.environment }} overlays..."
          find . -path "*/overlays/${{ matrix.environment }}/kustomization.yaml" -exec dirname {} \; | while read dir; do
            echo "Building $dir ..."
            kustomize build --enable-helm "$dir" > /dev/null || exit 1
          done
          # Env-agnostic kustomize roots — identical on every cluster (their
          # per-environment values resolve through External Secrets and the
          # cluster generator), so they carry no per-env overlays.
          for dir in dashboards/base addons/bootstrap/secret-stores; do
            echo "Building $dir ..."
            kustomize build --enable-helm "$dir" > /dev/null || exit 1
          done
          echo "All ${{ matrix.environment }} manifests built successfully."

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [lint, validate]
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const icon = r => r === 'success' ? ':white_check_mark:'
              : r === 'skipped' ? ':fast_forward:' : ':x:';
            const results = {
              'YAML Lint': '${{ needs.lint.result }}',
              'Kustomize Build (all environments)': '${{ needs.validate.result }}',
            };
            const rows = Object.entries(results)
              .map(([check, r]) => `| ${check} | ${icon(r)} ${r} |`)
              .join('\n');
            const passed = Object.values(results).every(r => r === 'success' || r === 'skipped');

            const body = `## CI Results

            | Check | Status |
            |-------|--------|
            ${rows}

            ${passed ? 'All checks passed.' : 'One or more checks failed — see the job logs.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
