name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  placeholders:
    name: Zero-placeholder gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: No unfilled placeholders in deploy config
        run: ./scripts/no-placeholders.sh

  lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

  # ── Dashboard gate ───────────────────────────────────────────────────
  # Every spec.grafanaCom.id must (a) still exist on grafana.com and (b) be
  # saveable by Amazon Managed Grafana. Both failure modes park the CR forever
  # and hold the dashboards Application — and app-of-apps — Degraded, and
  # neither is visible to kustomize/kubeconform/trivy: the ids render as valid
  # ints, so only grafana.com itself can answer. Talks to grafana.com over the
  # network; the script retries each request with backoff so a blip is a retry,
  # not a red build.
  dashboards:
    name: Dashboard gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dead ids + AMG-unsaveable legacy alerts
        run: ./scripts/validate-dashboards.py

  # ── Fork-safety gate ─────────────────────────────────────────────────
  # An applied ApplicationSet must not hardcode nanohype/eks-gitops — THIS
  # CATALOG — in a repoURL. The catalog is vended: a customer forks it and
  # points their hub at THEIR fork, so a hardcoded catalog ref keeps syncing
  # from upstream and the fork's own edits never take effect. Each must resolve
  # from the cluster Secret annotation gitops/repo-url, the same mechanism
  # dashboards.yaml already uses for monitoring/grafana-url.
  #
  # The scope is CATALOG-only, and that is load-bearing — do not widen it:
  # nanohype's PUBLISHED ARTIFACTS are correctly hardcoded, because a vended org
  # CONSUMES them from upstream rather than forking them, exactly like a Helm
  # repo or a container registry. Out of scope on purpose:
  #   - nanohype/eks-agent-platform — the operator's own source/chart repo. A
  #     customer does not fork the product; templating it would point at a fork
  #     that does not exist.
  #   - ghcr.io/nanohype/* images, oci://ghcr.io/nanohype charts.
  #   - the Kyverno keyless-signing subjectRegExp — a signing IDENTITY to verify
  #     against, not a source to sync from.
  #   - everything under applicationsets/opt-in/ — app-of-apps sources
  #     `path: applicationsets` without directory.recurse, so a default install
  #     never applies them; their org-specific URLs are documented in
  #     applicationsets/opt-in/README.md as a repoint-before-enabling step.
  # See the full rationale in scripts/check-hardcoded-org.py.
  #
  # TODO: MAKE THIS BLOCKING ONCE THE repoURL-TEMPLATING PR LANDS — add
  # `--blocking` to the run step below (matching TODO in the script). The
  # catalog currently carries 19 such refs and a companion PR is templating
  # them, so until that merges this gate is report-only: it prints every
  # violation and exits 0, rather than red-lighting the PR that fixes it.
  # Expected count after that lands: 0.
  fork-safety:
    name: Fork-safety gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: No hardcoded catalog repoURL in applied ApplicationSets
        run: ./scripts/check-hardcoded-org.py

  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, production, hub]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Render manifests
        run: |
          mkdir -p rendered
          echo "Rendering ${{ matrix.environment }} overlays..."
          find . -path "*/overlays/${{ matrix.environment }}/kustomization.yaml" -exec dirname {} \; | while read dir; do
            echo "Rendering $dir ..."
            kustomize build --enable-helm "$dir" > "rendered/$(echo "$dir" | tr '/' '_').yaml" || exit 1
          done
          # Env-agnostic kustomize roots — identical on every cluster (their
          # per-environment values resolve through External Secrets and the
          # cluster generator), so they carry no per-env overlays.
          for dir in dashboards/base addons/bootstrap/secret-stores; do
            echo "Rendering $dir ..."
            kustomize build --enable-helm "$dir" > "rendered/$(echo "$dir" | tr '/' '_').yaml" || exit 1
          done
          echo "All ${{ matrix.environment }} manifests rendered successfully."

      # The druid catalog chart deploys through the druid-tenants
      # ApplicationSet (base values layered with per-tenant values), so the
      # overlay loop above never touches it. Render it with synthetic tenant
      # values so the chart's templates pass through the same render-assert,
      # schema, and misconfiguration gates as every kustomize root.
      - name: Render druid catalog chart
        run: |
          helm template ci catalog/druid/chart -n druid-ci \
            -f catalog/druid/values.yaml \
            --set hostedId=ci \
            --set environment=${{ matrix.environment }} \
            --set secrets.metadata=ci/druid/metadata \
            --set secrets.admin=ci/druid/admin \
            --set secrets.system=ci/druid/system \
            --set secrets.keystore=ci/druid/keystore \
            --set s3.indexLogsBucket=ci-druid-indexlogs \
            --set s3.deepStorageBucket=ci-druid-deepstorage \
            --set s3.msqBucket=ci-druid-msq \
            > rendered/catalog_druid_chart.yaml

      # Source files are gated by the zero-placeholder job; this asserts the
      # RENDERED output too — catching a zero account id, placeholder token, or
      # account-less ARN that only appears after kustomize/helm templating.
      - name: Assert no unfilled sentinels in rendered output
        uses: nanohype/nanohype/.github/actions/render-assert@main
        with:
          manifests: rendered
          exclude: 'mcp-tunnel'

      # ── Schema gate ────────────────────────────────────────────────────
      # kubeconform in strict mode over everything just rendered. Native
      # kinds resolve from the default kubernetes-json-schema location; CRD
      # kinds resolve from the datreeio CRDs-catalog. There is deliberately
      # no -ignore-missing-schemas: a kind neither source knows fails the
      # build until it gets a schema or an explicit, justified -skip below.
      #   -skip Grafana — the single external Grafana CR ships
      #   spec.external.url empty by design (the dashboards ApplicationSet
      #   injects the per-cluster Amazon Managed Grafana URL via its cluster
      #   generator patch), and the catalog schema is stricter than the
      #   upstream CRD (requires tenantNamespace, which upstream does not).
      #
      #   -skip Platform,Tenant,ModelGateway,BudgetPolicy — the platform's OWN
      #   CRDs (platform.nanohype.dev, agents.nanohype.dev,
      #   governance.nanohype.dev). They are first-party: their schemas live in
      #   eks-agent-platform and are published to no public catalog, so neither
      #   schema-location can resolve them and kubeconform reports them as
      #   Errors (schema not found) rather than Invalid.
      #
      #   These are NOT unchecked. They are validated against the real
      #   validation webhook with `kubectl apply --dry-run=server`, which is a
      #   strictly stronger gate than a JSON-schema match — it caught a real
      #   error kubeconform could not have (identity.allowedModels and
      #   identity.allowedModelFamilies are mutually exclusive). CI has no
      #   cluster, so it cannot run that check; the skip records the gap rather
      #   than pretending the schema resolved.
      #
      #   To remove this skip: publish the eks-agent-platform CRD schemas (e.g.
      #   openapi2jsonschema over the CRD manifests) and add a -schema-location
      #   for them. Deferred deliberately — a vendored copy of a first-party
      #   schema drifts from the CRD that generates it, which is a worse failure
      #   than a documented skip.
      #
      # The binary and downloaded schemas are cached; restore-keys lets each
      # run reuse the newest cache while still persisting newly fetched
      # schemas.
      - name: Cache kubeconform + schemas
        uses: actions/cache@v6
        with:
          path: |
            ~/.local/bin/kubeconform
            ~/.cache/kubeconform
          key: kubeconform-v0.8.0-${{ github.run_id }}
          restore-keys: |
            kubeconform-v0.8.0-

      - name: Install kubeconform
        run: |
          if [ ! -x "$HOME/.local/bin/kubeconform" ]; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz \
              | tar -xz -C "$HOME/.local/bin" kubeconform
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Schema gate (kubeconform)
        run: |
          mkdir -p "$HOME/.cache/kubeconform"
          kubeconform -strict -summary \
            -cache "$HOME/.cache/kubeconform" \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -skip Grafana,Platform,Tenant,ModelGateway,BudgetPolicy \
            rendered

      # ── Misconfiguration gate ──────────────────────────────────────────
      # trivy config over the rendered manifests — not the repo tree — so
      # every check sees the post-templating truth with helm values applied.
      # MEDIUM and above hard-fails; .trivyignore.yaml carries the scoped,
      # justified exceptions (device-plugin root/hostPath, druid's
      # k8s-extensions Role, env-indirected config keys).
      - name: Install trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Misconfiguration gate (trivy config)
        run: |
          trivy config --exit-code 1 \
            --severity MEDIUM,HIGH,CRITICAL \
            --ignorefile .trivyignore.yaml \
            rendered

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [lint, dashboards, fork-safety, validate]
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const icon = r => r === 'success' ? ':white_check_mark:'
              : r === 'skipped' ? ':fast_forward:' : ':x:';
            const results = {
              'YAML Lint': '${{ needs.lint.result }}',
              'Dashboard gate (live grafana.com ids + AMG-saveable)': '${{ needs.dashboards.result }}',
              'Fork-safety gate (no hardcoded org, report-only)': '${{ needs.fork-safety.result }}',
              'Render + assert + schema + misconfig (all environments)': '${{ needs.validate.result }}',
            };
            const rows = Object.entries(results)
              .map(([check, r]) => `| ${check} | ${icon(r)} ${r} |`)
              .join('\n');
            const passed = Object.values(results).every(r => r === 'success' || r === 'skipped');

            const body = `## CI Results

            | Check | Status |
            |-------|--------|
            ${rows}

            ${passed ? 'All checks passed.' : 'One or more checks failed — see the job logs.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
