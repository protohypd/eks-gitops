# kagent — Kubernetes-native agent runtime.
#
# kagent is the RUNTIME this platform builds on, not the interface to it. The
# eks-agent-platform operator's AgentFleet CR "composes kagent Agent / ModelConfig
# / ToolServer CRs plus platform-specific scaffolding (KEDA, NetworkPolicy, IRSA
# binding)" — so agents are declared as AgentFleets and routed through a
# ModelGateway (which is Bedrock-backed, guardrailed and budgeted). Nothing here
# should hand-roll kagent CRs; that bypasses the identity, isolation and spend
# controls the platform exists to apply.
#
# Everything below is therefore about switching OFF the chart's own opinions so the
# platform's can apply instead.

# ─────────────────────────── SECURITY: the tools server ───────────────────────────
#
# The bundled kagent-tools sub-chart binds its ServiceAccount to a ClusterRole of:
#
#     rules:
#       - apiGroups: ["*"]  resources: ["*"]  verbs: ["*"]
#       - nonResourceURLs: ["*"]  verbs: ["*"]
#
# i.e. cluster-admin — unconditionally. It is not gated by any value: setting
# rbac.namespaces does NOT scope it (verified by templating the chart), and the
# kagent-tools sub-chart cannot be pulled independently to override it. Every
# agent's tool call executes through that ServiceAccount, and the 124-tool set it
# serves includes k8s_apply_manifest, k8s_delete_resource, k8s_execute_command,
# helm_uninstall and a raw shell tool.
#
# Enabling it therefore hands an LLM cluster-admin with no human-in-the-loop gate.
# We do not run it. Agents get their tools from ToolServers the operator composes
# per AgentFleet, whose identity and RBAC the platform controls.
kagent-tools:
  enabled: false

# ─────────────────────────── The bundled sample agents ───────────────────────────
#
# These ten Agent CRs are chart SAMPLE CONTENT, not the product — each is a system
# prompt plus a tool list, all pointing at the chart's default ModelConfig. They are
# off for three reasons:
#
#   1. They depend on kagent-tools (disabled above), so they have no tools.
#   2. They are hardwired to the chart's default OpenAI ModelConfig, which expects a
#      `kagent-openai` Secret this platform never creates and never should — on an
#      AWS cluster the model is Bedrock, reached by IAM, with no static key.
#   3. Several are hollow regardless: promql-agent ships with ZERO tools (it is a
#      system prompt that cannot see your metrics), and kgateway-agent /
#      cilium-policy-agent are close to prompt-only.
#
# Real ops agents belong in an AgentFleet, where they get a modelRoute, a scoped
# tool set, an IRSA binding and a NetworkPolicy.
k8s-agent:
  enabled: false
helm-agent:
  enabled: false
istio-agent:
  enabled: false
promql-agent:
  enabled: false
kgateway-agent:
  enabled: false
observability-agent:
  enabled: false
argo-rollouts-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-debug-agent:
  enabled: false
cilium-policy-agent:
  enabled: false

# ─────────────────────────── The default ModelConfig ───────────────────────────
#
# The chart always renders one ModelConfig from providers.default; there is no value
# that suppresses it. Left alone it emits provider: OpenAI with an apiKeySecretRef to
# a `kagent-openai` Secret — which is what wedged every agent pod in
# CreateContainerConfigError, since nothing creates (or should create) that Secret.
#
# kagent's ModelConfig CRD (v1alpha2) supports Bedrock as a first-class provider, and
# the Bedrock path takes NO credentials: `spec.bedrock` requires only a region, and
# the runtime resolves AWS credentials from the ambient chain (so EKS Pod Identity /
# IRSA works). We therefore repoint the default at Bedrock, which leaves no OpenAI
# surface anywhere in the release and no Secret to create.
#
# Note the chart's template emits only `provider` and `model` — it has no bedrock
# stanza, so it cannot set spec.bedrock.region here. That is fine BECAUSE this
# ModelConfig is a stub that no agent uses: real agents are declared as AgentFleets,
# and the operator composes their ModelConfig with the correct region. Do not attach
# an agent to this one.
providers:
  default: openAI # the key name is fixed by the chart; the provider below is what counts
  openAI:
    provider: Bedrock
    model: us.anthropic.claude-sonnet-5
    apiKeySecretRef: ""
    apiKeySecretKey: ""

# ─────────────────────── The controller needs time to migrate ───────────────────────
#
# On a FRESH install the controller crash-loops forever, and nothing says why:
#
#   msg: "running database migrations"
#   <49s later>  exit=137 (SIGKILL)   CrashLoopBackOff
#
# The chart's default startupProbe is initialDelaySeconds=15, periodSeconds=15,
# failureThreshold=3 — a 60-second budget to become healthy. That is ample on a cluster
# that has run before, because the migrations are already applied and the controller is
# up in seconds. On a fresh install it must apply the ENTIRE migration set against an
# empty Postgres, which takes longer than the budget. The kubelet SIGKILLs it, the pod
# restarts, the migrations start over from nothing, and it hits the same wall — forever.
#
# It never resolves on its own, and the failure is silent: no error is logged, because
# nothing errored. The process was killed.
#
# A startupProbe exists precisely so a slow-starting container can take as long as it
# needs WITHOUT loosening the ongoing health checks. failureThreshold=3 defeats that. The
# readinessProbe (periodSeconds=30) still governs steady-state health once it is up, so a
# long startup budget costs nothing.
#
# Overriding replaces the chart's probe entirely, so the handler is restated here.
# 15 + (15 x 40) = ~10 minutes, against migrations observed to need more than one.
controller:
  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 15
    failureThreshold: 40

# ─────────────────────── SECURITY + CORRECTNESS: grafana-mcp ───────────────────────
#
# The chart enables an MCP tool server for Grafana by default, pointed at a Grafana it
# assumes is bundled in-cluster:
#
#     grafana-mcp:
#       enabled: true
#       grafana:
#         url: "grafana.kagent:3000/api"     # no scheme, and no such Service here
#         serviceAccountToken: ""            # empty
#
# We do not run Grafana in-cluster. This platform uses Amazon Managed Grafana. So the
# server comes up, resolves nothing, and returns 403 to every MCP `initialize` — which
# leaves its RemoteMCPServer permanently Accepted=False:
#
#     failed to fetch tools for toolServer kagent/kagent-grafana-mcp:
#       calling "initialize": sending "initialize": Forbidden
#
# One un-Accepted RemoteMCPServer holds the whole kagent Application at Progressing, so
# ArgoCD never reports it Healthy and the convergence gate cannot pass. A tool server
# that is broken by construction is worse than one that is absent.
#
# ── Why we do not simply point it at AMG ──
#
# The only Grafana credential this platform has is the ADMIN service-account token that
# grafana-operator uses to push dashboards and data sources (eks-grafana-token). Handing
# that to an MCP tool server means every agent tool call reaches Grafana as an admin —
# able to rewrite dashboards, repoint data sources, and delete alert rules.
#
# That is the same trade we already refused for kagent-tools' cluster-admin ServiceAccount,
# on the same reasoning: an LLM-driven tool server does not get an admin credential.
#
# ── What a correct wire-up needs ──
#
# A dedicated AMG service account with the VIEWER role, its own token in Secrets Manager,
# an ExternalSecret projecting it into the kagent namespace, and the AMG endpoint injected
# per-cluster from the `monitoring/grafana-url` annotation cluster-bootstrap stamps on the
# ArgoCD cluster Secret (the same channel the dashboards ApplicationSet already uses).
# Read-only, per-cluster, and no admin anywhere. Until that exists, this stays off.
grafana-mcp:
  enabled: false
