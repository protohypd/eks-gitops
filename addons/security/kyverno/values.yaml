# Kyverno - Kubernetes Native Policy Management
# Adapted from aws-idp-gitops, using versions from base.ts

admissionController:
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

backgroundController:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

reportsController:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

cleanupController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

# Enable policy reports for visibility
features:
  policyExceptions:
    enabled: true
  reporting:
    validate: true
    mutate: true
    generate: true

# Webhook configuration
webhooksCleanup:
  enabled: true

# Override kubectl image for helm hooks. Bitnami migrated public images to
# `bitnamilegacy/` (the `bitnami/kubectl` repo on Docker Hub is no longer
# published). Pin to a real, existing tag — `latest` on the legacy repo
# isn't reliably maintained either.
cleanupJobs:
  admissionReports:
    image:
      registry: docker.io
      repository: bitnamilegacy/kubectl
      tag: 1.33.4-debian-12-r0
  clusterAdmissionReports:
    image:
      registry: docker.io
      repository: bitnamilegacy/kubectl
      tag: 1.33.4-debian-12-r0
