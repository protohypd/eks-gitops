# Falco - Runtime security and threat detection

driver:
  kind: modern_ebpf
  # camelCase keys — the previous snake_case (modern_ebpf/cpus_for_each_buffer/
  # buf_size_preset) sat on invalid paths and were silently dropped, so this
  # ring-buffer tuning did not apply until now.
  modernEbpf:
    cpusForEachBuffer: 4
    bufSizePreset: 4

falco:
  json_output: true
  log_stderr: true
  log_syslog: false
  priority: warning
  rule_matching: first
  # falco_libs (not libs) is the real config key for libsinspector tuning.
  falco_libs:
    thread_table_auto_purging_interval_s: 120
    thread_table_auto_purging_thread_timeout_s: 120

# Disable falcosidekick (enable per-env if needed)
falcosidekick:
  enabled: false

# Disable EKS marketplace addon images — use upstream chart
collectors:
  kubernetes:
    enabled: true

tty: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 2Gi

tolerations:
  - operator: Exists
