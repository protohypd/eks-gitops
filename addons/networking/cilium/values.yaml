# Cilium base configuration
# Environment-specific values are in values-{env}.yaml

# AWS ENI mode
eni:
  enabled: true
  # Prefix delegation: allocate /28 prefixes per ENI instead of single secondary
  # IPs, raising the per-node pod cap ~4x (m7g.large ~35 -> ~110). Without it a
  # freshly vended spoke syncing the full catalog exhausts node IPs before
  # Karpenter can scale out — pods stick in ContainerCreating with
  # "cilium-cni: no IPs available", and Karpenter itself can lose DNS. (#82)
  awsEnablePrefixDelegation: true
ipam:
  mode: eni
egressMasqueradeInterfaces: eth0
routingMode: native

# Expose cilium-agent Prometheus metrics (:9962); the chart auto-stamps the pod
# with prometheus.io/scrape so the annotation-gated Alloy collector scrapes it -> AMP
# (platform/cilium-overview.yaml). Hubble L7 metrics (:9965) are Service-only, so
# Alloy scrapes the hubble-metrics endpoints directly (see addons/observability/alloy).
prometheus:
  enabled: true

# Hubble observability (enabled globally)
hubble:
  enabled: true
  relay:
    enabled: true
    prometheus:
      enabled: true
  ui:
    enabled: true
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"

# mTLS encryption
encryption:
  enabled: true
  type: wireguard

# Network policies
policyEnforcementMode: default

# BPF settings
bpf:
  preallocateMaps: true

# Tolerations for system nodes
operator:
  prometheus:
    enabled: true
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

tolerations:
  - operator: Exists
