# External DNS

provider:
  name: aws

policy: sync

sources:
  - service
  - ingress

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
# Scrape the external-dns controller metrics (:7979) -> AMP (platform/external-dns.yaml).
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: /metrics
