# OpenCost - Kubernetes cost allocation and visibility

opencost:
  # Scrape the OpenCost exporter metrics (:9003) -> AMP (addons/opencost.yaml).
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9003"
    prometheus.io/path: /metrics
  exporter:
    defaultClusterId: eks
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  ui:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  # Single deployment (exporter + ui), so tolerations live at opencost.tolerations
  # — the previous per-component exporter/ui tolerations sat on invalid paths and
  # were silently dropped, so CriticalAddonsOnly never actually applied until now.
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
