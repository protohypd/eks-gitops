# Loki - hub overrides. Logs backend for the hub (singleBinary, gp3 PVC). Modest
# retention/size — the hub's own control-plane logs, not workload volume.

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/hub-eks-loki

loki:
  commonConfig:
    replication_factor: 1
  limits_config:
    retention_period: 168h

singleBinary:
  persistence:
    size: 20Gi
