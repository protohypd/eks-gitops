# Grafana Alloy - Telemetry collection.
# Collects logs, metrics, and traces and forwards to Loki/Tempo/AMP.
#
# Metrics: scraped from kube-state-metrics + cAdvisor + node-exporter +
#   pods with prometheus.io/scrape annotations, then remote-written to
#   Amazon Managed Service for Prometheus (AMP) via SigV4 signing.
#   An EKS Pod Identity association gives the SA aps:RemoteWrite on the AMP
#   workspace.

alloy:
  # AMP_REMOTE_WRITE_URL resolves from the managed-monitoring-endpoints Secret
  # (synced from Secrets Manager by External Secrets Operator). CLUSTER_NAME is
  # the per-environment external label, set in values-{env}.yaml. Helm replaces
  # the whole list, so each per-env file repeats these entries.
  extraEnv:
    - name: AMP_REMOTE_WRITE_URL
      valueFrom:
        secretKeyRef:
          name: managed-monitoring-endpoints
          key: AMP_REMOTE_WRITE_URL
    - name: AWS_REGION
      value: "us-west-2"
    - name: CLUSTER_NAME
      value: ""  # override per env
  # Expose the OTLP receiver ports on the Alloy Service so tenant apps in other
  # namespaces can push to alloy.monitoring.svc:4317/4318.
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  configMap:
    create: true
    content: |
      // ────────────────────────────── Discovery ──────────────────────────────
      discovery.kubernetes "pods" {
        role = "pod"
      }
      discovery.kubernetes "nodes" {
        role = "node"
      }
      discovery.kubernetes "services" {
        role = "service"
      }
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        // Honor prometheus.io/path — override the scrape path when annotated
        // (no-op for pods without the annotation; default stays /metrics).
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
        }
        // Honor prometheus.io/port — rewrite the target to pod IP : annotated
        // port so a workload can publish metrics on a non-default port. No-op
        // when the annotation is absent (the regex requires a port digit).
        rule {
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          regex         = "([^:]+)(?::\\d+)?;(\\d+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
        }
      }

      // ────────────────────────────── Metrics → AMP ──────────────────────────
      prometheus.scrape "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [prometheus.remote_write.amp.receiver]
      }

      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.kube-system.svc.cluster.local:8080",
        }]
        forward_to = [prometheus.remote_write.amp.receiver]
      }

      prometheus.scrape "cadvisor" {
        targets    = discovery.kubernetes.nodes.targets
        scheme     = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
        metrics_path = "/metrics/cadvisor"
        forward_to   = [prometheus.remote_write.amp.receiver]
      }

      // Hubble L7 metrics (:9965) are served per cilium-agent pod and exposed only
      // via the headless hubble-metrics Service in kube-system. The annotation-gated
      // pod scrape can't reach them (the cilium-agent pod's prometheus.io/port is its
      // own :9962), so scrape the service endpoints directly.
      discovery.kubernetes "hubble" {
        role = "endpoints"
        namespaces {
          names = ["kube-system"]
        }
      }
      discovery.relabel "hubble" {
        targets = discovery.kubernetes.hubble.targets
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex         = "hubble-metrics"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }
      prometheus.scrape "hubble" {
        targets    = discovery.relabel.hubble.output
        forward_to = [prometheus.remote_write.amp.receiver]
      }

      // SigV4 signs each remote-write request with the credentials the EKS Pod
      // Identity agent projects for the SA. AMP expects service "aps" and the
      // workspace's region.
      prometheus.remote_write "amp" {
        endpoint {
          url = env("AMP_REMOTE_WRITE_URL")
          sigv4 {
            region = env("AWS_REGION")
          }
        }
        external_labels = {
          cluster = env("CLUSTER_NAME"),
        }
      }

      // ────────────────────────────── Logs → Loki ────────────────────────────
      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.default.receiver]
      }
      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

      // ──────────────────── OTLP ingest (traces + metrics + logs) ─────────────
      // Tenant apps push OTLP to Alloy on :4317/:4318 (exposed via the Alloy
      // Service + alloy.extraPorts above). Traces go to Tempo; metrics and logs are
      // converted and fed into the same AMP remote-write / Loki sinks the scrape and
      // tail pipelines use — without these outputs the OTLP metrics and logs would be
      // silently dropped.
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces  = [otelcol.exporter.otlp.tempo.input]
          metrics = [otelcol.exporter.prometheus.otlp.input]
          logs    = [otelcol.exporter.loki.otlp.input]
        }
      }
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }
      // OTLP metrics → Prometheus → AMP (same SigV4 remote-write as the scrape path).
      otelcol.exporter.prometheus "otlp" {
        forward_to = [prometheus.remote_write.amp.receiver]
      }
      // OTLP logs → Loki (same sink as the kubernetes log tail).
      otelcol.exporter.loki "otlp" {
        forward_to = [loki.write.default.receiver]
      }

# An EKS Pod Identity association (landing-zone) gives this SA aps:RemoteWrite —
# no role-arn annotation. The SigV4 credential chain is satisfied by the Pod
# Identity agent.
serviceAccount:
  create: true
  name: alloy

# DaemonSet on every node — tolerate all taints so the collector also lands on
# tainted (GPU / Neuron / system) nodes.
controller:
  tolerations:
    - operator: Exists
