# Grafana Agent - hub overrides. The collector for all three pillars on the hub:
# scrapes pods (metrics → AMP via the IRSA role below), tails logs (→ Loki) and
# receives traces (→ Tempo), both in-cluster in the monitoring namespace.

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/hub-eks-grafana-agent-amp

extraEnv:
  - name: AMP_REMOTE_WRITE_URL
    value: "https://aps-workspaces.us-west-2.amazonaws.com/workspaces/ws-PLACEHOLDER/api/v1/remote_write"
  - name: AWS_REGION
    value: "us-west-2"
  - name: CLUSTER_NAME
    value: "hub-eks"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
