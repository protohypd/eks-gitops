# Grafana Agent - hub overrides. The collector for all three pillars on the hub:
# scrapes pods (metrics → AMP via the Pod Identity association), tails logs
# (→ Loki) and receives traces (→ Tempo), both in-cluster in the monitoring
# namespace.

agent:
  extraEnv:
    - name: AMP_REMOTE_WRITE_URL
      valueFrom:
        secretKeyRef:
          name: managed-monitoring-endpoints
          key: AMP_REMOTE_WRITE_URL
    - name: AWS_REGION
      value: "us-west-2"
    - name: CLUSTER_NAME
      value: "hub-eks"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
