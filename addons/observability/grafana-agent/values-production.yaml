# Grafana Agent - Production overrides

agent:
  extraEnv:
    - name: AMP_REMOTE_WRITE_URL
      valueFrom:
        secretKeyRef:
          name: managed-monitoring-endpoints
          key: AMP_REMOTE_WRITE_URL
    - name: AWS_REGION
      value: "us-west-2"
    - name: CLUSTER_NAME
      value: "production-eks"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
