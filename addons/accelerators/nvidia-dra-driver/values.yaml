# NVIDIA DRA driver (Dynamic Resource Allocation) — base values.
#
# Provides DeviceClass + ResourceClaim semantics for NVIDIA GPUs. The
# eks-agent-platform operator reconciles AcceleratorPool CRs into
# DeviceClass + Karpenter NodePool pairs, then references the resulting
# DeviceClass from ResourceClaimTemplates emitted by AgentRuntime CRs.
#
# Requires the cluster to have the DynamicResourceAllocation feature gate
# enabled. EKS 1.32+ enables it by default.

nvidiaDriverRoot: /run/nvidia/driver

deviceClasses:
  - name: gpu.nvidia.com
    config:
      sharing:
        strategy: TimeSlicing
        timeSlicingConfig:
          interval: Default

resources:
  controller:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      memory: 512Mi
  plugin:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

nodeSelector: {}
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

priorityClassName: system-node-critical
