apiVersion: v1
kind: Namespace
metadata:
  name: aws-neuron
  labels:
    # Device-plugin pods need root and hostPath; declare baseline PSS
    # rather than restricted so the kubelet does not block scheduling.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
