apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: neuron-device-plugin
  # Device plugins live in their own namespace rather than kube-system so
  # PSS labels and audit can be scoped to the device-plugin layer without
  # touching the kubelet-adjacent surface.
  namespace: aws-neuron
  labels:
    app: neuron-device-plugin
spec:
  selector:
    matchLabels:
      app: neuron-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: neuron-device-plugin
    spec:
      serviceAccountName: neuron-device-plugin
      priorityClassName: system-node-critical
      nodeSelector:
        aws.amazon.com/neuron: "true"
      tolerations:
        - key: aws.amazon.com/neuron
          operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      securityContext:
        # The upstream Neuron plugin image runs as uid 0 to access
        # /sys/class/neuron_device; runAsNonRoot would block startup.
        # Pin uid/gid explicitly so the security context is declared
        # rather than defaulted, and apply RuntimeDefault seccomp at
        # pod scope so every container inherits it.
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: plugin
          image: public.ecr.aws/neuron/neuron-device-plugin:2.22.4.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 200Mi
          env:
            - name: KUBECONFIG
              value: /etc/kubernetes/kubelet.conf
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: infa-map
              mountPath: /run
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: infa-map
          hostPath:
            path: /run
