# Staging — 4 replicas per GPU for realistic perf characteristics
devicePlugin:
  config:
    data:
      any: |
        version: v1
        flags:
          migStrategy: none
        sharing:
          timeSlicing:
            renameByDefault: false
            failRequestsGreaterThanOne: false
            resources:
              - name: nvidia.com/gpu
                replicas: 4
