# Argo Rollouts - Progressive delivery (canary/blue-green)

controller:
  # Scrape the rollouts-controller metrics (:8090) -> AMP (addons/argo-rollouts.yaml).
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8090"
    prometheus.io/path: /metrics
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

dashboard:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
