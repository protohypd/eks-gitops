apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# External Secrets wiring delivered cluster-wide: the AWS Secrets Manager store
# (cluster-scoped) and the monitoring-namespace endpoint sync that depends on it
# (namespaced — it carries its own metadata.namespace). No namespace transform,
# so the ClusterSecretStore stays cluster-scoped.
resources:
  - cluster-secret-store.yaml
  - monitoring-endpoints.yaml
