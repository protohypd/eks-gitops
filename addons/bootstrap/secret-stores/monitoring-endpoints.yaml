# Alloy (monitoring namespace) reads the AMP remote-write URL from this
# Secret via an env var. Synced from the Secrets Manager secret the landing-zone
# managed-monitoring component publishes. The grafana-operator namespace gets its
# own copy from dashboards/base (for the data source url); a plain ExternalSecret
# per namespace keeps both on the same external-secrets.io/v1 shape the Grafana
# token already uses.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: managed-monitoring-endpoints
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: managed-monitoring-endpoints
    creationPolicy: Owner
  data:
    - secretKey: AMP_REMOTE_WRITE_URL
      remoteRef:
        key: eks-managed-monitoring-endpoints
        property: AMP_REMOTE_WRITE_URL
