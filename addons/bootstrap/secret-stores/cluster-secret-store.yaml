# The cluster-wide AWS Secrets Manager store. Every ExternalSecret that pulls
# from Secrets Manager (the Grafana service-account token, the monitoring
# endpoints) references this store by name.
#
# No auth block: the External Secrets Operator controller authenticates with the
# AWS SDK default credential chain, satisfied by the EKS Pod Identity association
# landing-zone binds to the external-secrets ServiceAccount (which grants
# secretsmanager:GetSecretValue). No static keys, no IRSA annotation.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
