# Karpenter - Node Autoscaler

replicas: 2

# Karpenter is the only thing that can relieve a saturated cluster, so it must
# never be the pod that gets evicted or stranded. system-cluster-critical lets
# the scheduler preempt lower-priority pods to keep it running on a contended
# bootstrap node. (#82)
priorityClassName: system-cluster-critical

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
    effect: NoSchedule

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
# Scrape: the annotation-gated hub grafana-agent (Alloy) scrapes the karpenter
# controller metrics (:8080) -> AMP, feeding dashboards/base/addons/karpenter.yaml.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: /metrics
