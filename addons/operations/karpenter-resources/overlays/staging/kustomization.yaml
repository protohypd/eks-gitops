apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: karpenter.sh/v1
      kind: NodePool
      metadata:
        name: default
      spec:
        limits:
          cpu: 75
          memory: 150Gi

  - patch: |-
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      metadata:
        name: default
      spec:
        role: staging-eks-karpenter-node
        subnetSelectorTerms:
          - tags:
              karpenter.sh/discovery: staging-eks
              kubernetes.io/role/internal-elb: "1"
        securityGroupSelectorTerms:
          - tags:
              aws:eks:cluster-name: staging-eks
        tags:
          environment: staging
          managed-by: karpenter
    target:
      kind: EC2NodeClass
      name: default
